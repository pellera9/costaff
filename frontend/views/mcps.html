<div class="flex gap-10 h-[calc(100vh-160px)]">
    <!-- List Panel -->
    <div class="w-96 flex flex-col card-linear bg-white p-0 overflow-hidden border border-slate-100 rounded-[2rem] shadow-xl">
        <div class="p-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
            <div class="flex items-center gap-3">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Extensions</span>
                <span id="mcp-count" class="bg-blue-50 text-blue-600 text-[10px] font-bold px-2 py-0.5 rounded-full">0</span>
            </div>
            <button onclick="UI.openAddModal('mcp')" class="w-8 h-8 rounded-lg bg-blue-600 text-white flex items-center justify-center hover:scale-110 transition-transform shadow-lg shadow-blue-200">
                <i class="fas fa-plus text-xs"></i>
            </button>
        </div>
        <div id="mcp-list" class="flex-1 overflow-y-auto divide-y divide-slate-50">
            <!-- List by JS -->
        </div>
    </div>

    <!-- Detail Panel -->
    <div id="mcp-content-wrapper" class="flex-1 card-linear bg-white p-0 flex flex-col overflow-hidden border border-slate-100 rounded-[2rem] shadow-xl">
        <div id="mcp-placeholder" class="flex-1 flex flex-col items-center justify-center opacity-20 uppercase tracking-[0.5em] font-headline text-slate-400">
            <i class="fas fa-plug text-6xl mb-8"></i>
            <p>Select an Extension</p>
        </div>

        <div id="mcp-content" class="flex-1 flex flex-col hidden overflow-hidden">
            <!-- FIXED HEADER -->
            <div class="p-8 border-b border-slate-100 flex items-center justify-between bg-slate-50/50 shrink-0">
                <div>
                    <h2 id="mcp-header" class="text-3xl font-headline font-bold text-slate-900 uppercase tracking-tighter">--</h2>
                    <span id="mcp-type-badge" class="text-[10px] text-blue-600 font-bold uppercase tracking-widest">Local</span>
                </div>
                <div id="mcp-detail-actions"></div>
            </div>

            <!-- SCROLLABLE BODY -->
            <div class="flex-1 overflow-y-auto p-10 space-y-10 bg-slate-50/30 custom-scrollbar">
                <div id="field-group-source" class="mb-8">
                    <label class="text-[10px] text-slate-400 block mb-4 font-bold uppercase tracking-widest ml-1">Transport Protocol</label>
                    <select id="mcp-transport-select" class="bg-slate-100 border-none rounded-xl px-5 py-2.5 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500/20">
                        <option value="streamable">Streamable HTTP (Default)</option>
                        <option value="sse">SSE (Server-Sent Events)</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-10">
                    <div class="space-y-3">
                        <label class="text-[10px] font-bold text-blue-600 uppercase tracking-widest ml-1">Name</label>
                        <input type="text" id="mcp-input-name" class="w-full bg-white border border-slate-100 rounded-xl px-5 py-4 text-slate-900 font-bold outline-none focus:ring-2 focus:ring-blue-500/20">
                    </div>
                    <div class="space-y-3">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Internal ID</label>
                        <input type="text" id="mcp-field-id" readonly class="w-full bg-transparent border-none text-slate-400 font-mono text-sm outline-none">
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Description</label>
                    <textarea id="mcp-input-desc" rows="2" class="w-full bg-white border border-slate-100 rounded-xl px-5 py-4 text-slate-900 outline-none focus:ring-2 focus:ring-blue-500/20"></textarea>
                </div>

                <div id="field-group-url" class="space-y-3">
                    <label class="text-[10px] font-bold text-blue-600 uppercase tracking-widest ml-1">API Endpoint</label>
                    <input type="text" id="mcp-field-url" class="w-full bg-white border border-slate-100 rounded-xl px-5 py-4 font-mono text-blue-600 outline-none focus:ring-2 focus:ring-blue-500/20">
                </div>

                <div id="field-group-headers" class="space-y-3">
                    <div class="flex items-center justify-between ml-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Request Headers</label>
                        <button onclick="UI.addHeaderRow()" class="text-[10px] font-bold text-blue-600 hover:text-blue-700 uppercase tracking-widest flex items-center gap-1">
                            <i class="fas fa-plus text-[8px]"></i> Add
                        </button>
                    </div>
                    <div id="headers-editor" class="space-y-2"></div>
                </div>

                <div class="space-y-3">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Configuration (JSON)</label>
                    <textarea id="mcp-json-editor" rows="10" class="w-full bg-slate-900 text-blue-400 border-none rounded-2xl p-8 font-mono text-sm shadow-inner"></textarea>
                </div>

                <div id="mcp-save-row" class="pt-10 border-t border-slate-100 flex justify-end">
                    <button onclick="UI.saveMCPConfig()" class="px-12 py-4 bg-blue-600 text-white rounded-xl font-bold uppercase tracking-widest hover:bg-blue-700 transition-all shadow-xl shadow-blue-200">
                        Save Extension
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
