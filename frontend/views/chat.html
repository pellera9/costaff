<!-- Chat Sessions Sidebar -->
<aside id="chat-sidebar" class="w-80 border-r border-slate-100 flex flex-col shrink-0 bg-white">
    <div class="p-6 border-b border-slate-100 flex items-center gap-4">
        <div class="w-10 h-10 rounded-2xl bg-blue-600 text-white flex items-center justify-center shadow-lg shadow-blue-200 shrink-0">
            <i class="fas fa-robot text-sm"></i>
        </div>
        <div class="flex-1 min-w-0">
            <div class="text-sm font-headline font-bold text-slate-900 uppercase tracking-tight">CoStaff Agent</div>
            <div class="flex items-center gap-1.5 mt-0.5">
                <span class="status-badge badge-active"><span class="badge-dot"></span>Online</span>
            </div>
        </div>
        <button onclick="UI.startNewChat()" title="New Chat" class="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-xl transition-all border border-slate-100 hover:border-blue-200">
            <i class="fas fa-plus text-xs"></i>
        </button>
    </div>
    <div class="px-6 py-3 border-b border-slate-100">
        <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Conversation History</h3>
    </div>
    <div id="chat-session-list" class="flex-1 overflow-y-auto">
        <div class="p-10 text-center text-slate-400 text-xs italic">Syncing history...</div>
    </div>
</aside>

<!-- Main Chat Area -->
<div class="flex-1 flex flex-col overflow-hidden bg-slate-50">
    <header class="h-16 border-b border-slate-100 flex items-center justify-between px-8 bg-white shrink-0">
        <div class="flex items-center gap-3">
            <span id="chat-session-label" class="text-[10px] font-mono text-slate-400 uppercase tracking-widest">New Session</span>
        </div>
        <div class="flex items-center gap-3">
            <span id="chat-status-badge" class="status-badge badge-live"><span class="badge-dot"></span>Live</span>
        </div>
    </header>

    <div id="chat-messages" class="flex-1 overflow-y-auto p-8 space-y-8">
        <div class="h-full flex flex-col items-center justify-center text-slate-400">
            <i class="fas fa-comments text-7xl mb-6 opacity-20"></i>
            <p class="uppercase text-xs text-center font-bold tracking-[0.3em]">Start a new conversation</p>
        </div>
    </div>

    <div class="p-8 pt-0 relative">
        <div class="max-w-4xl mx-auto relative">
            <!-- Slash Command Suggestions -->
            <div id="slash-commands" class="absolute bottom-full left-0 right-0 mb-4 bg-white/95 backdrop-blur-2xl border border-slate-200 rounded-[1.5rem] shadow-2xl overflow-hidden hidden z-50">
                <div class="p-4 border-b border-slate-100 bg-slate-50 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Commands</div>
                <div id="slash-list" class="max-h-64 overflow-y-auto py-2">
                    <!-- Commands populated by JS -->
                </div>
            </div>

            <form id="chat-form" class="group">
                <div class="relative flex items-center bg-white border border-slate-200 rounded-2xl focus-within:border-blue-500/50 focus-within:ring-4 focus-within:ring-blue-500/5 transition-all shadow-xl shadow-slate-200/50">
                    <input type="text" id="chat-input" placeholder="Message CoStaff..." autocomplete="off"
                        class="flex-1 bg-transparent px-6 py-5 text-slate-900 placeholder-slate-400 outline-none text-[15px]">
                    <div class="pr-3">
                        <button type="submit" class="w-12 h-12 rounded-xl bg-blue-600 text-white hover:bg-blue-700 transition-all flex items-center justify-center shadow-lg shadow-blue-200">
                            <i class="fas fa-arrow-up"></i>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
