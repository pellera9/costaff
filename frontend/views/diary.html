<div class="flex flex-col h-full gap-6">
    <!-- Header -->
    <div class="flex justify-between items-center">
        <p class="text-slate-500 font-medium text-sm">AI 團隊每日、每週、每月工作記錄</p>
        <div class="flex items-center gap-3">
            <select id="diary-days-filter" onchange="Diary.load()" class="bg-white border border-slate-200 rounded-xl px-4 py-2 text-sm font-bold text-slate-600 outline-none focus:ring-2 focus:ring-blue-500/20">
                <option value="7">最近 7 天</option>
                <option value="14">最近 14 天</option>
                <option value="30">最近 30 天</option>
                <option value="90">最近 90 天</option>
            </select>
            <button onclick="Diary.load()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl font-bold text-sm transition-all flex items-center gap-2">
                <i class="fas fa-sync-alt text-xs"></i> 重新整理
            </button>
        </div>
    </div>

    <!-- Content -->
    <div class="flex-1 overflow-y-auto custom-scrollbar" id="diary-feed">
        <div class="flex items-center justify-center h-40 text-slate-300 text-xs font-bold uppercase tracking-widest">Loading...</div>
    </div>
</div>
