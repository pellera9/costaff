<div class="flex gap-10 h-[calc(100vh-160px)]">

    <!-- Left: Date Timeline -->
    <div class="w-80 flex flex-col bg-white border border-slate-100 rounded-[2rem] shadow-xl overflow-hidden shrink-0">
        <div class="p-5 border-b border-slate-100 bg-slate-50/50 flex items-center justify-between">
            <div>
                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Work Journal</span>
                <p id="diary-entry-count" class="text-[10px] text-slate-400 font-medium mt-0.5">— entries</p>
            </div>
            <div class="flex items-center gap-2">
                <select id="diary-days-filter" onchange="Diary.load()" class="bg-white border border-slate-200 rounded-lg px-2 py-1.5 text-[10px] font-bold text-slate-600 outline-none focus:ring-2 focus:ring-blue-500/20">
                    <option value="7">7 天</option>
                    <option value="14">14 天</option>
                    <option value="30">30 天</option>
                    <option value="90">90 天</option>
                </select>
                <button onclick="Diary.load()" class="w-7 h-7 rounded-lg bg-blue-600 text-white flex items-center justify-center hover:scale-110 transition-transform shadow-lg shadow-blue-200">
                    <i class="fas fa-sync-alt text-[9px]"></i>
                </button>
            </div>
        </div>
        <div id="diary-date-list" class="flex-1 overflow-y-auto divide-y divide-slate-50 custom-scrollbar">
            <div class="flex items-center justify-center h-20 text-slate-300 text-[10px] font-bold uppercase tracking-widest">Loading...</div>
        </div>
    </div>

    <!-- Right: Entry Detail -->
    <div class="flex-1 flex flex-col bg-white border border-slate-100 rounded-[2rem] shadow-xl overflow-hidden">
        <!-- Placeholder -->
        <div id="diary-placeholder" class="flex-1 flex flex-col items-center justify-center opacity-20 uppercase tracking-[0.5em] font-headline text-slate-400">
            <i class="fas fa-book-open text-6xl mb-8"></i>
            <p>Select a Date</p>
        </div>

        <!-- Detail -->
        <div id="diary-detail" class="flex-1 flex-col hidden overflow-hidden">
            <div class="p-8 border-b border-slate-100 bg-slate-50/50 shrink-0 flex items-center justify-between">
                <div>
                    <h2 id="diary-detail-date" class="text-3xl font-headline font-bold text-slate-900 tracking-tighter uppercase">—</h2>
                    <p id="diary-detail-meta" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">—</p>
                </div>
                <i class="fas fa-book text-slate-200 text-3xl"></i>
            </div>
            <div id="diary-detail-cards" class="flex-1 overflow-y-auto p-8 bg-slate-50/30 custom-scrollbar">
                <!-- Filled by JS -->
            </div>
        </div>
    </div>

</div>
