<div class="max-w-4xl mx-auto">
    <div class="mb-10">
        <h3 class="text-2xl font-bold text-slate-900 mb-2">System Appearance</h3>
        <p class="text-slate-500">Customize how CoStaff Dashboard looks on your screen.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Theme Toggle Card -->
        <div class="card-linear border border-slate-100 rounded-3xl p-8 shadow-xl bg-white">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-12 h-12 bg-blue-600/20 text-blue-500 rounded-2xl flex items-center justify-center">
                    <i class="fas fa-palette text-xl"></i>
                </div>
                <div>
                    <h4 class="font-bold text-slate-900">Theme Mode</h4>
                    <p class="text-xs text-slate-500">Switch between dark and light</p>
                </div>
            </div>
            
            <div class="flex gap-4">
                <button onclick="UI.toggleTheme('dark')" id="theme-btn-dark" class="flex-1 flex flex-col items-center gap-3 p-4 rounded-2xl border-2 border-slate-200 hover:border-slate-300 transition-all">
                    <i class="fas fa-moon text-2xl text-slate-400"></i>
                    <span class="text-sm font-bold text-slate-500">Dark Mode</span>
                </button>
                <button onclick="UI.toggleTheme('light')" id="theme-btn-light" class="flex-1 flex flex-col items-center gap-3 p-4 rounded-2xl border-2 border-blue-600 bg-blue-50 shadow-md transition-all">
                    <i class="fas fa-sun text-2xl text-blue-500"></i>
                    <span class="text-sm font-bold text-slate-900">Light Mode</span>
                </button>
            </div>
        </div>

        <!-- Require Approval Toggle -->
        <div class="card-linear border border-slate-100 rounded-3xl p-8 shadow-xl bg-white">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-12 h-12 bg-amber-500/20 text-amber-500 rounded-2xl flex items-center justify-center">
                    <i class="fas fa-shield-halved text-xl"></i>
                </div>
                <div>
                    <h4 class="font-bold text-slate-900">User Approval Gate</h4>
                    <p class="text-xs text-slate-500">Require admin approval before users can chat</p>
                </div>
            </div>
            <div class="flex items-center justify-between p-4 rounded-2xl bg-slate-50">
                <div class="flex-1 min-w-0 pr-4">
                    <p class="text-sm font-semibold text-slate-700">Require Approval</p>
                    <p class="text-xs text-slate-400 mt-0.5" id="approval-status-text">Loading...</p>
                </div>
                <button id="approval-toggle-btn" class="relative inline-flex h-7 w-14 shrink-0 items-center rounded-full transition-colors focus:outline-none">
                    <span id="approval-toggle-knob" class="inline-block h-5 w-5 transform rounded-full bg-white shadow-md transition-transform"></span>
                </button>
            </div>
        </div>

    </div>
</div>
