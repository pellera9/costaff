<!-- Section: Hardware Infrastructure -->
<div class="mb-4 p-4 md:p-6">
    <div class="flex items-center justify-between mb-4 asymmetric-header">
        <div>
            <h2 class="text-3xl font-headline font-bold tracking-tight uppercase text-slate-900">System Health</h2>
            <p class="text-xs text-blue-600 font-bold tracking-widest mt-1 opacity-60 uppercase">Real-time Node Pulse</p>
        </div>
        <div id="dashboard-last-update" class="text-[10px] font-mono text-slate-400 uppercase">SYNC_PENDING</div>
    </div>
    
    <div id="os-stats-grid" class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <!-- Bento Cards by JS -->
    </div>
</div>

<!-- Section: Ecosystem Metrics -->
<div class="mb-4 p-4 md:p-6">
    <div class="asymmetric-header mb-4">
        <h3 class="text-lg font-headline font-bold text-slate-400 uppercase tracking-widest">Ecosystem Metrics</h3>
    </div>
    <div id="stats-grid" class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <!-- Bento Cards by JS -->
    </div>
</div>

<!-- Section: License -->
<div class="mb-4 p-4 md:p-6">
    <div class="asymmetric-header mb-4">
        <h3 class="text-lg font-headline font-bold text-slate-400 uppercase tracking-widest">License</h3>
    </div>
    <div id="license-card" class="bg-white border border-slate-100 rounded-[2rem] shadow-xl p-6">
        <p class="text-slate-300 italic text-xs">Loading license info...</p>
    </div>
</div>

<!-- Section: AI Team -->
<div class="mb-4 p-4 md:p-6">
    <div class="asymmetric-header mb-4">
        <h3 class="text-lg font-headline font-bold text-slate-400 uppercase tracking-widest">AI Team</h3>
    </div>
    <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
        <!-- Scheduled Jobs -->
        <div class="xl:col-span-1 bg-white border border-slate-100 rounded-[2rem] shadow-xl overflow-hidden">
            <div class="p-5 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                <div class="flex items-center gap-2">
                    <div class="w-7 h-7 rounded-lg bg-blue-600/10 text-blue-500 flex items-center justify-center">
                        <i class="fas fa-sync-alt text-xs"></i>
                    </div>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Active Agent Schedules</span>
                </div>
                <div id="dash-rw-badge" class="px-2 py-0.5 rounded-full bg-slate-100 text-[10px] font-bold text-slate-500">0 JOBS</div>
            </div>
            <div id="dash-rw-list" class="divide-y divide-slate-50">
                <div class="flex items-center justify-center h-20 text-slate-300 text-[10px] font-bold uppercase tracking-widest">Loading...</div>
            </div>
        </div>

        <!-- Diary Feed -->
        <div class="xl:col-span-2 bg-white border border-slate-100 rounded-[2rem] shadow-xl overflow-hidden">
            <div class="p-5 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                <div class="flex items-center gap-2">
                    <div class="w-7 h-7 rounded-lg bg-purple-600/10 text-purple-500 flex items-center justify-center">
                        <i class="fas fa-book text-xs"></i>
                    </div>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Diary</span>
                </div>
                <div id="dash-diary-date" class="text-[10px] font-mono text-slate-400 uppercase"></div>
            </div>
            <div id="dash-diary-list" class="overflow-y-auto max-h-[420px] custom-scrollbar divide-y divide-slate-50">
                <div class="flex items-center justify-center h-20 text-slate-300 text-[10px] font-bold uppercase tracking-widest">Loading...</div>
            </div>
        </div>
    </div>
</div>

<!-- Section: Process Matrix -->
<div class="p-4 md:p-6">
    <div class="card-linear overflow-hidden bg-white border border-slate-100 rounded-[2rem] shadow-xl p-6">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-headline font-bold text-slate-900 uppercase tracking-widest">Runtime Monitor</h3>
            <span class="status-badge badge-live"><span class="badge-dot"></span>Live Data Stream</span>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead id="status-thead"></thead>
                <tbody id="status-table">
                    <!-- Rows by JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>
