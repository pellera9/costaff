# Pre-commit hooks for CoStaff core.
#
# Install once on your machine:
#     pip install pre-commit
#     pre-commit install
#
# After `pre-commit install` every `git commit` runs the hooks below.
# Skip in a true emergency with `git commit --no-verify`, but please
# don't make that a habit — bypassing gitleaks is exactly how Incident
# #33211417 (the leaked Google Express key in `.costaff_backup/config.json`)
# slipped through.

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        # Uses our custom rules + allowlists from .gitleaks.toml at the
        # repo root. The hook only scans STAGED changes (fast).
        args: ["--config", ".gitleaks.toml"]

  # Block CoStaff-specific footguns: `.env`, `.costaff_backup/`,
  # `config.json` files getting staged. Cheap belt-and-suspenders on
  # top of .gitignore — gitignore wouldn't catch a `git add -f` slip.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: forbid-new-submodules
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: check-yaml
        exclude: '\.github/workflows/'  # workflows have GH-specific tags pyyaml chokes on
      - id: check-json
        exclude: '\.vscode/'
      - id: end-of-file-fixer
      - id: trailing-whitespace
